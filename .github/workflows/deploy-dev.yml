name: Deploy to EC2

on:
    push:
        branches: ['main', 'dev']
    pull_request:
        branches: ['main', 'dev']

permissions:
    contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: on BuildKit 
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            set -euo pipefail

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker compose up -d --pull always redis_container app

            CURRENT_TG=$(aws elbv2 describe-listeners \
              --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
              --region ${{ secrets.AWS_REGION }} \
              --query 'Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[0].TargetGroupArn || Listeners[0].DefaultActions[0].TargetGroupArn' \
              --output text)

            BLUE_TG=${{ secrets.BLUE_TG_ARN }}
            GREEN_TG=${{ secrets.GREEN_TG_ARN }}

            if [ "$CURRENT_TG" = "$BLUE_TG" ]; then
              ACTIVE=blue
              INACTIVE=green
              INACTIVE_TG=$GREEN_TG
              INACTIVE_PORT=3001
            else
              ACTIVE=green
              INACTIVE=blue
              INACTIVE_TG=$BLUE_TG
              INACTIVE_PORT=3000
            fi

            echo "Active=$ACTIVE, Inactive=$INACTIVE → Deploy to $INACTIVE"

            docker compose pull teamie-$INACTIVE
            docker compose up -d teamie-$INACTIVE

            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:${INACTIVE_PORT}/health > /dev/null; then
                echo "Health OK on ${INACTIVE} (port ${INACTIVE_PORT})"
                break
              fi
              echo "Waiting health... (${i})"
              sleep 2
            done

            docker compose exec -T teamie-$INACTIVE npm run migrate:run

            aws elbv2 modify-listener \
              --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
              --region ${{ secrets.AWS_REGION }} \
              --default-actions Type=forward,TargetGroupArn=${INACTIVE_TG}

            echo "ALB switched to $INACTIVE"

            sleep 20
            docker compose stop app-$ACTIVE || true

            docker compose logs
            docker image prune -f
